<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI UI 设计生成平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            secondary: '#7c3aed',
            accent: '#06b6d4',
          },
        },
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans">
  <!-- 导航栏 -->
  <nav class="bg-white shadow-md">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <i class="fa fa-paint-brush text-primary text-2xl"></i>
        <h1 class="text-xl font-bold text-gray-800">AI UI 设计生成平台</h1>
      </div>
      <div class="flex items-center space-x-4">
        <span id="user-info" class="text-sm text-gray-600 hidden">
          <span id="nickname"></span> | 剩余次数: <span id="remain"></span>
        </span>
        <button id="history-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors hidden">
          历史记录
        </button>
        <button id="pay-btn" class="px-4 py-2 bg-secondary text-white rounded-md hover:bg-secondary/90 transition-colors hidden">
          充值
        </button>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- 左侧输入区域 -->
      <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4">输入设计描述</h2>
        <textarea 
          id="design-description" 
          class="w-full h-48 p-4 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary resize-none"
          placeholder="请描述您想要的UI设计，例如：'一个现代风格的登录页面，包含用户名、密码输入框和登录按钮，背景为浅蓝色'"
        ></textarea>
        
        <!-- 草图原型图上传入口 -->
        <div class="mt-4">
          <h3 class="text-sm font-medium text-gray-700 mb-2">上传草图原型图</h3>
          <div class="border-2 border-dashed border-gray-300 rounded-md p-4 text-center hover:border-primary transition-colors">
            <input 
              type="file" 
              id="file-input" 
              class="hidden" 
              accept="image/*"
            >
            <button 
              id="upload-btn" 
              class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 transition-colors"
            >
              选择文件
            </button>
            <p class="mt-2 text-xs text-gray-500">支持 JPG、PNG、SVG 格式</p>
            <div id="image-preview" class="mt-2 hidden">
              <img id="uploaded-image" class="max-h-32 mx-auto rounded" alt="上传的草图">
              <button 
                id="remove-image" 
                class="mt-2 text-xs text-red-500 hover:text-red-700"
              >
                移除图片
              </button>
            </div>
          </div>
        </div>
        
        <div class="mt-4">
          <button 
            id="generate-btn" 
            class="w-full py-3 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors flex items-center justify-center"
          >
            <span id="generate-text">生成设计</span>
            <span id="loading" class="ml-2 hidden">
              <i class="fa fa-spinner fa-spin"></i>
            </span>
          </button>
        </div>
        <div class="mt-4 text-sm text-gray-500">
          <p>提示：描述越详细，生成的设计越符合您的需求</p>
        </div>
      </div>

      <!-- 右侧预览区域 -->
      <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold mb-4">设计预览</h2>
        
        <!-- 预览选项卡 -->
        <div class="flex border-b border-gray-200 mb-4">
          <button 
            id="preview-tab" 
            class="px-4 py-2 font-medium border-b-2 border-primary text-primary"
          >
            预览效果
          </button>
          <button 
            id="code-tab" 
            class="px-4 py-2 font-medium text-gray-500 hover:text-gray-700"
          >
            代码编辑
          </button>
        </div>
        
        <!-- 预览内容 -->
        <div class="border border-gray-300 rounded-md p-4 min-h-[400px]">
          <div id="empty-state" class="h-full flex items-center justify-center">
            <div class="text-center text-gray-400">
              <i class="fa fa-paint-brush text-4xl mb-4"></i>
              <p>输入设计描述并点击生成按钮</p>
            </div>
          </div>
          <div id="preview-content" class="w-full hidden">
            <div id="design-preview" class="bg-gray-100 p-4 rounded-md"></div>
          </div>
          <div id="code-content" class="w-full hidden">
            <textarea 
              id="code-editor" 
              class="w-full h-[400px] p-4 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary resize-none font-mono text-sm"
              placeholder="编辑HTML代码"
            ></textarea>
          </div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="mt-4 flex flex-wrap gap-2">
          <button 
            id="save-code" 
            class="px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors hidden"
          >
            保存代码
          </button>
          <button 
            id="copy-html" 
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors hidden"
          >
            <i class="fa fa-copy mr-2"></i> 复制HTML
          </button>
          <button 
            id="export-png" 
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors hidden"
          >
            导出 PNG
          </button>
          <button 
            id="export-svg" 
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors hidden"
          >
            导出 SVG
          </button>
          <button 
            id="export-html" 
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors hidden"
          >
            导出 HTML
          </button>
          <button 
            id="open-figma" 
            class="px-4 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 transition-colors hidden"
          >
            在Figma中打开
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部信息 -->
  <footer class="bg-white border-t border-gray-200 mt-8 py-4">
    <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
      <p>AI UI 设计生成平台 - 基于豆包AI的智能设计工具</p>
    </div>
  </footer>



  <script>
    // 全局变量
    let currentHtml = '';

    // DOM 元素
    const elements = {
      userInfo: document.getElementById('user-info'),
      nickname: document.getElementById('nickname'),
      remain: document.getElementById('remain'),
      historyBtn: document.getElementById('history-btn'),
      payBtn: document.getElementById('pay-btn'),
      designDescription: document.getElementById('design-description'),
      fileInput: document.getElementById('file-input'),
      uploadBtn: document.getElementById('upload-btn'),
      imagePreview: document.getElementById('image-preview'),
      uploadedImage: document.getElementById('uploaded-image'),
      removeImage: document.getElementById('remove-image'),
      generateBtn: document.getElementById('generate-btn'),
      generateText: document.getElementById('generate-text'),
      loading: document.getElementById('loading'),
      previewTab: document.getElementById('preview-tab'),
      codeTab: document.getElementById('code-tab'),
      emptyState: document.getElementById('empty-state'),
      previewContent: document.getElementById('preview-content'),
      designPreview: document.getElementById('design-preview'),
      codeContent: document.getElementById('code-content'),
      codeEditor: document.getElementById('code-editor'),
      saveCode: document.getElementById('save-code'),
      copyHtml: document.getElementById('copy-html'),
      exportPng: document.getElementById('export-png'),
      exportSvg: document.getElementById('export-svg'),
      exportHtml: document.getElementById('export-html'),
      openFigma: document.getElementById('open-figma')
    };

    // 初始化
    function init() {
      getUserInfo();
      bindEvents();
    }

    // 获取用户信息
    function getUserInfo() {
      fetch('/api/user/info')
      .then(res => res.json())
      .then(data => {
        if (data.code === 0) {
          elements.userInfo.classList.remove('hidden');
          elements.nickname.textContent = data.data.nickname;
          elements.remain.textContent = data.data.remain;
          elements.historyBtn.classList.remove('hidden');
          elements.payBtn.classList.remove('hidden');
        }
      })
      .catch(err => {
        console.error('获取用户信息失败:', err);
      });
    }

    // 绑定事件
    function bindEvents() {
      // 历史记录
      elements.historyBtn.addEventListener('click', () => {
        window.location.href = '/history';
      });

      // 充值
      elements.payBtn.addEventListener('click', () => {
        window.location.href = '/pay';
      });

      // 文件上传
      elements.uploadBtn.addEventListener('click', () => {
        elements.fileInput.click();
      });

      elements.fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            elements.uploadedImage.src = e.target.result;
            elements.imagePreview.classList.remove('hidden');
          };
          reader.readAsDataURL(file);
        }
      });

      // 移除图片
      elements.removeImage.addEventListener('click', () => {
        elements.imagePreview.classList.add('hidden');
        elements.fileInput.value = '';
      });

      // 生成设计
      elements.generateBtn.addEventListener('click', () => {
        const prompt = elements.designDescription.value.trim();
        if (!prompt) {
          alert('请输入设计描述');
          return;
        }

        elements.generateText.textContent = '生成中...';
        elements.loading.classList.remove('hidden');
        elements.generateBtn.disabled = true;

        fetch('/api/generate/ui', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ prompt })
        })
        .then(res => res.json())
        .then(data => {
          elements.generateText.textContent = '生成设计';
          elements.loading.classList.add('hidden');
          elements.generateBtn.disabled = false;

          if (data.code === 0) {
            currentHtml = data.data.html;
            elements.designPreview.innerHTML = currentHtml;
            elements.codeEditor.value = currentHtml;
            elements.emptyState.classList.add('hidden');
            elements.previewContent.classList.remove('hidden');
            elements.codeContent.classList.add('hidden');
            elements.saveCode.classList.remove('hidden');
            elements.copyHtml.classList.remove('hidden');
            elements.exportPng.classList.remove('hidden');
            elements.exportSvg.classList.remove('hidden');
            elements.exportHtml.classList.remove('hidden');
            elements.openFigma.classList.remove('hidden');
            elements.remain.textContent = data.data.remain;
          } else {
            alert(data.msg);
          }
        })
        .catch(err => {
          console.error('生成失败:', err);
          elements.generateText.textContent = '生成设计';
          elements.loading.classList.add('hidden');
          elements.generateBtn.disabled = false;
          alert('生成失败，请重试');
        });
      });

      // 预览选项卡
      elements.previewTab.addEventListener('click', () => {
        elements.previewTab.classList.add('border-b-2', 'border-primary', 'text-primary');
        elements.previewTab.classList.remove('text-gray-500');
        elements.codeTab.classList.remove('border-b-2', 'border-primary', 'text-primary');
        elements.codeTab.classList.add('text-gray-500');
        elements.previewContent.classList.remove('hidden');
        elements.codeContent.classList.add('hidden');
      });

      elements.codeTab.addEventListener('click', () => {
        elements.codeTab.classList.add('border-b-2', 'border-primary', 'text-primary');
        elements.codeTab.classList.remove('text-gray-500');
        elements.previewTab.classList.remove('border-b-2', 'border-primary', 'text-primary');
        elements.previewTab.classList.add('text-gray-500');
        elements.codeContent.classList.remove('hidden');
        elements.previewContent.classList.add('hidden');
      });

      // 保存代码
      elements.saveCode.addEventListener('click', () => {
        currentHtml = elements.codeEditor.value;
        elements.designPreview.innerHTML = currentHtml;
        alert('代码已保存');
      });

      // 导出 PNG
      elements.exportPng.addEventListener('click', () => {
        if (!currentHtml) {
          alert('请先生成设计');
          return;
        }
        
        elements.exportPng.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 导出中...';
        elements.exportPng.disabled = true;
        
        html2canvas(elements.designPreview, {
          scale: 2,
          useCORS: true,
          logging: false
        })
        .then(canvas => {
          const link = document.createElement('a');
          link.download = 'ui-design.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          
          elements.exportPng.innerHTML = '导出 PNG';
          elements.exportPng.disabled = false;
        })
        .catch(err => {
          console.error('导出失败:', err);
          elements.exportPng.innerHTML = '导出 PNG';
          elements.exportPng.disabled = false;
          alert('导出失败，请重试');
        });
      });

      // 导出 SVG
      elements.exportSvg.addEventListener('click', () => {
        if (!currentHtml) {
          alert('请先生成设计');
          return;
        }
        
        elements.exportSvg.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 导出中...';
        elements.exportSvg.disabled = true;
        
        try {
          // 创建SVG根元素
          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('width', elements.designPreview.offsetWidth);
          svg.setAttribute('height', elements.designPreview.offsetHeight);
          svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
          
          // 遍历设计预览中的所有元素并转换为SVG
          const elementsToConvert = elements.designPreview.querySelectorAll('*');
          elementsToConvert.forEach(element => {
            const svgElement = convertElementToSvg(element);
            if (svgElement) {
              svg.appendChild(svgElement);
            }
          });
          
          // 生成SVG文件
          const svgData = new XMLSerializer().serializeToString(svg);
          const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
          const svgUrl = URL.createObjectURL(svgBlob);
          
          // 下载SVG文件
          const link = document.createElement('a');
          link.download = 'ui-design.svg';
          link.href = svgUrl;
          link.click();
          
          // 清理
          URL.revokeObjectURL(svgUrl);
          
          elements.exportSvg.innerHTML = '导出 SVG';
          elements.exportSvg.disabled = false;
        } catch (err) {
          console.error('导出SVG失败:', err);
          elements.exportSvg.innerHTML = '导出 SVG';
          elements.exportSvg.disabled = false;
          alert('导出SVG失败，请重试');
        }
      });

      // 将HTML元素转换为SVG元素
      function convertElementToSvg(element) {
        const computedStyle = window.getComputedStyle(element);
        const bounds = element.getBoundingClientRect();
        const designBounds = elements.designPreview.getBoundingClientRect();
        
        // 计算相对位置
        const x = bounds.left - designBounds.left;
        const y = bounds.top - designBounds.top;
        const width = bounds.width;
        const height = bounds.height;
        
        // 跳过隐藏元素
        if (computedStyle.display === 'none' || computedStyle.visibility === 'hidden') {
          return null;
        }
        
        // 创建SVG组元素
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', `translate(${x}, ${y})`);
        
        // 处理背景
        if (computedStyle.backgroundColor !== 'rgba(0, 0, 0, 0)') {
          const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          rect.setAttribute('width', width);
          rect.setAttribute('height', height);
          rect.setAttribute('fill', computedStyle.backgroundColor);
          
          // 处理圆角
          const borderRadius = computedStyle.borderRadius;
          if (borderRadius !== '0px') {
            rect.setAttribute('rx', borderRadius);
            rect.setAttribute('ry', borderRadius);
          }
          
          // 处理边框
          if (computedStyle.border !== '0px none rgb(0, 0, 0)') {
            rect.setAttribute('stroke', computedStyle.borderColor);
            rect.setAttribute('stroke-width', computedStyle.borderWidth);
          }
          
          g.appendChild(rect);
        }
        
        // 处理文本
        if (element.nodeType === Node.TEXT_NODE || 
            (element.nodeType === Node.ELEMENT_NODE && 
             ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'span', 'a', 'button'].includes(element.tagName.toLowerCase()))) {
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.textContent = element.textContent || element.innerText;
          text.setAttribute('x', '10');
          text.setAttribute('y', '20');
          text.setAttribute('fill', computedStyle.color);
          text.setAttribute('font-size', computedStyle.fontSize);
          text.setAttribute('font-family', computedStyle.fontFamily);
          text.setAttribute('font-weight', computedStyle.fontWeight);
          
          g.appendChild(text);
        }
        
        // 处理图片
        if (element.tagName && element.tagName.toLowerCase() === 'img' && element.src) {
          const image = document.createElementNS('http://www.w3.org/2000/svg', 'image');
          image.setAttribute('width', width);
          image.setAttribute('height', height);
          image.setAttribute('href', element.src);
          
          g.appendChild(image);
        }
        
        return g;
      }

      // 导出 HTML
      elements.exportHtml.addEventListener('click', () => {
        window.location.href = `/api/export/html?html=${encodeURIComponent(currentHtml)}`;
      });

      // 复制HTML
      elements.copyHtml.addEventListener('click', () => {
        navigator.clipboard.writeText(currentHtml)
          .then(() => {
            alert('HTML代码已复制到剪贴板');
          })
          .catch(err => {
            console.error('复制失败:', err);
            alert('复制失败，请手动复制');
          });
      });

      // 在Figma中打开
      elements.openFigma.addEventListener('click', () => {
        if (!currentHtml) {
          alert('请先生成设计');
          return;
        }
        
        // 复制HTML代码到剪贴板
        navigator.clipboard.writeText(currentHtml)
          .then(() => {
            // 打开Figma
            window.open('https://www.figma.com/files/recent', '_blank');
            // 显示提示
            alert('HTML代码已复制到剪贴板，请在Figma中创建新文件并粘贴代码');
          })
          .catch(err => {
            console.error('复制失败:', err);
            // 打开Figma
            window.open('https://www.figma.com/files/recent', '_blank');
            // 显示提示
            alert('请手动复制HTML代码并在Figma中创建新文件');
          });
      });
    }

    // 初始化
    init();
  </script>
</body>
</html>
